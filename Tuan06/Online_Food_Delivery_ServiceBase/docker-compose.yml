version: "3.8"
services:
  mongo:
    image: mongo:7
    container_name: ofd_service_mongo
    ports:
      - "27018:27017"
    volumes:
      - service_mongo_data:/data/db

  menu-service:
    image: node:20
    container_name: ofd_menu_service
    working_dir: /app
    volumes:
      - ./backend/services/menu-service:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - PORT=6001
      - MONGO_URI=mongodb://mongo:27017/ofd_menu_service
    ports:
      - "6001:6001"
    depends_on:
      - mongo

  cart-service:
    image: node:20
    container_name: ofd_cart_service
    working_dir: /app
    volumes:
      - ./backend/services/cart-service:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - PORT=6002
      - MONGO_URI=mongodb://mongo:27017/ofd_cart_service
      - MENU_SERVICE_URL=http://menu-service:6001
    ports:
      - "6002:6002"
    depends_on:
      - mongo
      - menu-service

  order-service:
    image: node:20
    container_name: ofd_order_service
    working_dir: /app
    volumes:
      - ./backend/services/order-service:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - PORT=6003
      - MONGO_URI=mongodb://mongo:27017/ofd_order_service
      - CART_SERVICE_URL=http://cart-service:6002
    ports:
      - "6003:6003"
    depends_on:
      - mongo
      - cart-service

  gateway:
    image: node:20
    container_name: ofd_gateway
    working_dir: /app
    volumes:
      - ./backend/gateway:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - PORT=8000
      - MENU_SERVICE_URL=http://menu-service:6001
      - CART_SERVICE_URL=http://cart-service:6002
      - ORDER_SERVICE_URL=http://order-service:6003
    ports:
      - "8000:8000"
    depends_on:
      - menu-service
      - cart-service
      - order-service

  frontend:
    image: node:20
    container_name: ofd_service_frontend
    working_dir: /app
    volumes:
      - ./fontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5174:5174"
    depends_on:
      - gateway

volumes:
  service_mongo_data: