version: "3.8"
services:
  mongo:
    image: mongo:7
    container_name: ofd_mono_mongo
    ports:
      - "27017:27017"
    volumes:
      - mono_mongo_data:/data/db

  backend:
    image: node:20
    container_name: ofd_mono_backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/online_food_delivery_mono
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  frontend:
    image: node:20
    container_name: ofd_mono_frontend
    working_dir: /app
    volumes:
      - ./fontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mono_mongo_data: